<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>PaperTrail Oral</title>
<link rel="icon" href="https://papertrailacademic.com/icon128.png" />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  body{font-family:"DM Sans",system-ui,sans-serif;color:#1a2235;background:#f6f7f9;margin:0;
    display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .box{max-width:460px}
  img{width:44px;height:44px;border-radius:8px}
  h1{font-family:"Lora",serif;font-size:1.4rem;margin:.6em 0 .3em}
  h1 span{color:#2a7a6b}
  p{color:#5b6472;line-height:1.55}
  .rule{height:3px;width:54px;background:#C9A84C;border-radius:3px;margin:14px auto}
</style>
</head>
<body>
  <div class="box">
    <img src="https://papertrailacademic.com/icon128.png" alt="" />
    <h1>PaperTrail <span>Oral</span></h1>
    <div class="rule"></div>
    <p>The teacher dashboard is on its way. If a teacher sent you a recording link,
       open that link directly to record your responses.</p>
  </div>
</body>
</html>
